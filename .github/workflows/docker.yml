# Flujo de trabajo para construir y subir la imagen de Docker a Docker Hub

name: Construir y subir nuestra imagen de docker a Docker Hub
on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Verificar el código
        uses: actions/checkout@v4

      - name: Iniciar sesión en Docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Construir y subir la imagen de Docker
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/api_usuarios:latest